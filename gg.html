      /* Force the outermost document node to cleanly clip overflows and anchor layout rules */
      html {
        margin: 0 !important;

        overflow: hidden !important;

    <script type="text/javascript">
      function haveAudioSupport() {
          try { if (new AudioContext()) return true; } catch (ignore) { }
          try { if (new webkitAudioContext()) return true; } catch (ignore) { }
          return false;
      }
      if (!haveAudioSupport()) {
        var url = window.location.href;
        var base = url.match(/[^?#]*/);
        var query = url.match(/\?[^#]*/) || "";
        var hash = url.match(/#.*/);
        query = query.toString().replace(/[?&]$/, "");
        query = query ? query + "&" : "?";
        query += "show=need_flash";
        url = base + query;
        if (hash) url += hash;
        window.location.href = url;
      }
    </script>

    <script type="text/javascript">
      // Global Viewport Scaler
      // Rather than scaling inner DOM elements independently, we scale the complete layout context 
      // relative to the center origin. This forces the browser to align target event vectors accurately.
      function applyViewportScaling() {
        const nativeW = 1000;
        const nativeH = 600;

        const screenW = window.innerWidth;
        const screenH = window.innerHeight;

        // Calculate maximum scaling coefficient while honoring the native game aspect ratio constraints
        const scaleFactor = Math.min(screenW / nativeW, screenH / nativeH);

        // Map unified centering and scale transformations onto the primary document frame body
        document.body.style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;
      }

      // Track scaling requirements across browser adjustment events
      window.addEventListener('resize', applyViewportScaling);
      window.addEventListener('DOMContentLoaded', applyViewportScaling);
      window.addEventListener('load', applyViewportScaling);
    </script>
