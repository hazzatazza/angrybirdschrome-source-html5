    <script type="text/javascript">
      function getFlashVersion() {
          try {
              var version;
              try {
                  version = new ActiveXObject("ShockwaveFlash.ShockwaveFlash").GetVariable("$version");
              } catch (e) {
                  version = navigator.plugins["Shockwave Flash"].description;
              }
              return version.replace(/\D*(\d+).*/g, "$1");
          } catch (e) {
              return -1;
          }
      }

      function haveAudioSupport() {
          try {
            if (new AudioContext()) {
              return true;
            }
          } catch (ignore) { }

          try {
            if (new webkitAudioContext()) {
              return true;
            }
          } catch (ignore) { }

          return getFlashVersion() >= 9.0;
      }
    </script>
    
    <script type="text/javascript">
      if (!haveAudioSupport()) {
        url = window.location.href;

        base = url.match(/[^?#]*/);
        query = url.match(/\?[^#]*/) || "";
        hash = url.match(/#.*/);

        query = query.toString().replace(/[?&]$/, "");
        query = query ? query + "&" : "?";
        query += "show=need_flash";

        url = base + query;
        if (hash) url += hash;

        window.location.href = url;
      }
    </script>

      // Dynamic Zoom scaling mechanism
      // Using browser-level 'zoom' instead of CSS transforms preserves the cursor tracking vectors perfectly
      function scaleWholeViewport() {
        const baseW = 1000;
        const baseH = 600;
        
        // Use real screen dimensions un-impacted by current styling
        const currentW = window.top.innerWidth;
        const currentH = window.top.innerHeight;

        // Find the scale factor
        const scaleFactor = Math.min(currentW / baseW, currentH / baseH);

        // Apply zoom modifier directly to the document root element
        document.documentElement.style.zoom = scaleFactor;
      }

      window.addEventListener('resize', scaleWholeViewport);
      window.addEventListener('DOMContentLoaded', scaleWholeViewport);
      window.addEventListener('load', scaleWholeViewport);
    </script>
