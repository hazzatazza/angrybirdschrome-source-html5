<!DOCTYPE html>
<html>
  <head>
    <title>Angry Birds Chrome</title>
    <meta name="Title" content="Angry Birds Chrome">
    <meta name="description" content="Play Angry Birds online in HD with Google Chrome">
    <meta name="keywords" content="angry birds, free angry birds, online game, play online, angry birds app, chrome, google chrome, web browser, HD, arcade game, online, play angry birds online, web, application, game, iphone, android, ipad, slingshot, catapult, explosions, golden egg, levels, pigs, birds, stars, high scores, chrome os, chrome web store, angry birds rovio, play angry birds on computer, apps for chrome, play angry birds free">
    <link href='http://fonts.googleapis.com/css?family=Terminal+Dosis:800' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="css/angry_birds_chrome.css" type="text/css">
    
    <style>
      /* Clean out margins and fix the background canvas area to black */
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        height: 100% !important;
        overflow: hidden !important;
        background-color: #000 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }

      /* Responsive bounding frame maintaining the perfect 1000x600 structural ratio */
      #content {
        position: relative !important;
        width: 100vw !important;
        height: calc(100vw / (1000 / 600)) !important;
        max-height: 100vh !important;
        max-width: calc(100vh * (1000 / 600)) !important;
        margin: 0 auto !important;
        padding: 0 !important;
      }

      #gameDiv, #playn-root {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }

      /* Target the hidden bootstrapper iframe generated by fowl.nocache.js */
      /* We force it to inherit the exact scale dimensions of our main screen block */
      iframe#fowl, #playn-root canvas {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        display: block !important;
      }

      /* Clear out native configuration text and control menus */
      .buttons, #social-container, #optimized, #rovionews, #videochapter {
        display: none !important;
      }
    </style>

    <script type="text/javascript" src="fowl/fowl.nocache.js"></script>
  </head>
  <body>

    <div class="gamecont" id="content">
      <div id='gameDiv'>
        <div id='playn-root'>
          <div id="loading">
            <img src="images/loading_image_bird.png" style="width:100%; height:100%; object-fit:contain;" />
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // Deep Input Hook System targeting the inner GWT Frame
      (function() {
        const VIRTUAL_W = 1000;
        const VIRTUAL_H = 600;

        function interceptAndTranslate(e, targetWindow) {
          // Prevent standard, offset click operations from leaking through to the engine
          if (e.simulated) return;
          e.stopImmediatePropagation();
          e.preventDefault();

          const contentFrame = document.getElementById('content');
          if (!contentFrame) return;

          const bounds = contentFrame.getBoundingClientRect();

          // Map the pointer coordinates to the strict 1000x600 space expected by PlayN
          const computedX = ((e.clientX - bounds.left) / bounds.width) * VIRTUAL_W;
          const computedY = ((e.clientY - bounds.top) / bounds.height) * VIRTUAL_H;

          // Rebuild an explicit Mouse Event carrying the exact pixel coordinates the game engine expects
          const proxyEvent = new MouseEvent(e.type, {
            bubbles: true,
            cancelable: true,
            view: targetWindow,
            detail: e.detail,
            screenX: window.screenLeft + bounds.left + computedX,
            screenY: window.screenTop + bounds.top + computedY,
            clientX: computedX, // Crucial step: forces inner client checks to read structural pixels
            clientY: computedY,
            ctrlKey: e.ctrlKey,
            altKey: e.altKey,
            shiftKey: e.shiftKey,
            metaKey: e.metaKey,
            button: e.button,
            buttons: e.buttons,
            relatedTarget: e.relatedTarget
          });

          proxyEvent.simulated = true;

          // Dispatch straight to the hidden game canvas layer
          const innerCanvas = targetWindow.document.querySelector('#playn-root canvas') || targetWindow.document.body;
          innerCanvas.dispatchEvent(proxyEvent);
        }

        // Keep looking for the hidden GWT runtime iframe structure as it mounts in the DOM
        const frameFinderLoop = setInterval(() => {
          const gwtFrame = document.getElementById('fowl');
          if (gwtFrame && gwtFrame.contentWindow) {
            clearInterval(frameFinderLoop);

            const innerWin = gwtFrame.contentWindow;
            const eventRegistry = ['mousedown', 'mouseup', 'mousemove', 'click', 'mouseenter', 'mouseleave'];

            // Hook input events right inside the hidden document framework
            eventRegistry.forEach(eventName => {
              innerWin.addEventListener(eventName, (e) => {
                interceptAndTranslate(e, innerWin);
              }, true);

              // Capture inputs tracking on the root outer window layer as well
              window.addEventListener(eventName, (e) => {
                interceptAndTranslate(e, innerWin);
              }, true);
            });
          }
        }, 100);
      })();
    </script>

  </body>
</html>
